{% extends 'admin_base.html' %}
{% load static %}
{% block content %}
<div class="container">

    <h2 class="mb-4">
        <i class="fas fa-key"></i> Change Password
    </h2>

    {% if messages %}
        {% for m in messages %}
            <div class="alert alert-{% if m.tags == 'error' %}danger{% else %}{{ m.tags }}{% endif %} alert-dismissible fade show">
                {{ m }}
                <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
            </div>
        {% endfor %}
    {% endif %}

    <form method="post">
        {% csrf_token %}

        <div class="mb-3">
            <label class="old_password">Old Password</label>
            <input type="password" class="form-control" name="old_password" required placeholder="enter current Password">
        </div>

      <div class="mb-3">
            <label class="new_password">New Password</label>
            <input type="password" class="form-control" name="new_password" required placeholder="enter new Password">
        </div>

        <div class="mb-3">
            <label class="confirm_password">Confirm  New Password</label>
            <input type="password" class="form-control" name="confirm_password" required placeholder="enter new Password again">
        </div>
        
        <button type="submit" class="btn btn-success">
            <i class="fas fa-check-circle me-1"></i> Submit
        </button>
    </form>

</div>
{% endblock %}
