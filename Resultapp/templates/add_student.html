{% extends 'admin_base.html' %}
{% load static %}

{% block content %}
<div class="container">

    <h2 class="mb-4">
        <i class="fas fa-plus"></i> Add Student
    </h2>

    {% if messages %}
        {% for m in messages %}
            <div class="alert alert-{% if m.tags == 'error' %}danger{% else %}{{ m.tags }}{% endif %} alert-dismissible fade show">
                {{ m }}
                <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
            </div>
        {% endfor %}
    {% endif %}

    <form method="post">
        {% csrf_token %}

        <div class="mb-3">
            <label class="form-label">Student Full Name</label>
            <input type="text" class="form-control" name="fullname" required placeholder="Enter fullName"></div>

   
        <div class="mb-3">
            <label class="form-label">Roll ID</label>
            <input type="text" class="form-control" name="rollid" required placeholder="Roll Number">
        </div>

     
        <div class="mb-3">
            <label class="form-label">Email</label>
            <input type="email" class="form-control" name="email" required placeholder="Email ID">
        </div>

        <div class="mb-3">
            <label class="form-label">Gender</label>
            <select class="form-control" name="gender" required>
                <option value="">Select Gender</option>
                <option value="Male">Male</option>
                <option value="Female">Female</option>
            </select>
        </div>

      
        <div class="mb-3">
            <label class="form-label">Date of Birth</label>
            <input type="date" class="form-control" name="dob" required>
        </div>

       
        <div class="mb-3">
            <label class="form-label">Class</label>
            <select class="form-control" name="class" required>
                <option value="">Select Class</option>
                {% for c in classes %}
                    <option value="{{ c.id }}">
                        {{ c.class_name }} - Section {{ c.section }}
                    </option>
                {% endfor %}
            </select>
        </div>

        <button type="submit" class="btn btn-success">
            <i class="fas fa-check-circle me-1"></i> Submit
        </button>
    </form>

</div>
{% endblock %}
