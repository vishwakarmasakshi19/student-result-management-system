{% extends 'admin_base.html' %}
{% load static %}
{% block content %}
<div class="container">

    <h2 class="mb-4">
        <i class="fas fa-plus"></i> Add Subject Combination
    </h2>

    {% if messages %}
        {% for m in messages %}
            <div class="alert alert-{% if m.tags == 'error' %}danger{% else %}{{ m.tags }}{% endif %} alert-dismissible fade show">
                {{ m }}
                <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
            </div>
        {% endfor %}
    {% endif %}

    <form method="post">
        {% csrf_token %}

        <div class="mb-3">
            <label class="form-label">Select class</label>
            <select type="text" class="form-control" name="class" required>
                    <option value="">---Select Class---<option>
                    {% for i in classes %}
                       <option value="{{i.id}}">{{i.class_name}}-section {{i.section}}<option></option>
                       <option value="{{i.id}}">{{i.class_name}}-section {{i.section}}<option></option>
                    {% endfor%}
                    </select>
        </div>

        <div class="mb-3">
            <label class="form-label"> Select Subject </label>
            <select type="text" class="form-control" name="subject" required >
                <option>---Select Subject--- </option>
                    {% for i in subjects %}
                       <option value="{{i.id}}">{{i.subject_name}}  - {{i.subject_code}}<option></option>
                    {% endfor%}
                </select>
        </div>

        <button type="submit" class="btn btn-success">
            <i class="fas fa-check-circle me-1"></i> Submit
        </button>
    </form>

</div>
{% endblock %}
