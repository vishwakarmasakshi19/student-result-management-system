{% extends 'admin_base.html' %}
{% load static %}
{% block content %}
<div class="container">

    <h2 class="mb-4"><i class="fas fa-edit"></i> Edit Subject</h2>

    {% if messages %}
        {% for m in messages %}
            <div class="alert alert-{% if m.tags == 'error' %}danger{% else %}{{ m.tags }}{% endif %} alert-dismissible fade show">
                {{ m }}
                <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
            </div>
        {% endfor %}
    {% endif %}

    <form method="post">
        {% csrf_token %}

        <div class="mb-3">
            <label class="form-label">Subject Name</label>
            <input type="text" class="form-control" name="subjectname"
                   value="{{ subject_obj.subject_name }}" required>
        </div>

        <div class="mb-3">
            <label class="form-label">Subject Code</label>
            <input type="text" class="form-control" name="subjectcode"
                   value="{{ subject_obj.subject_code }}" required>
        </div>

        <button type="submit" class="btn btn-success">
            <i class="fas fa-check-circle me-1"></i> Update
        </button>

    </form>

</div>
{% endblock %}
